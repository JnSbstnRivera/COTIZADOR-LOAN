<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo azul financiero -->
  <circle cx="32" cy="32" r="32" fill="#1e3a5f"/>
  <!-- Edificio banco -->
  <rect x="16" y="28" width="32" height="22" rx="1" fill="#2563eb"/>
  <!-- Techo/frontón del banco -->
  <polygon points="12,28 32,14 52,28" fill="#3b82f6"/>
  <!-- Columnas -->
  <rect x="19" y="30" width="4" height="18" rx="1" fill="#93c5fd"/>
  <rect x="26" y="30" width="4" height="18" rx="1" fill="#93c5fd"/>
  <rect x="34" y="30" width="4" height="18" rx="1" fill="#93c5fd"/>
  <rect x="41" y="30" width="4" height="18" rx="1" fill="#93c5fd"/>
  <!-- Base -->
  <rect x="13" y="48" width="38" height="4" rx="1" fill="#1d4ed8"/>
  <!-- Signo $ en el centro del frontón -->
  <text x="32" y="26" font-family="Arial Black" font-size="10" font-weight="900"
    fill="#fde047" text-anchor="middle">$</text>
  <!-- Sol pequeño arriba -->
  <circle cx="52" cy="14" r="5" fill="#fbbf24"/>
  <line x1="52" y1="6" x2="52" y2="4" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="10" x2="60" y2="8" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="14" x2="62" y2="14" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
</svg>
